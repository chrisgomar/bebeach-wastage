<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BeBeach Wastage Consolidator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #EAE6DC;
    --cream-dark: #D8D3C6;
    --gold: #8B7540;
    --gold-light: #A8915A;
    --gold-pale: #C9B98A;
    --ink: #2C2720;
    --ink-mid: #5A5248;
    --ink-light: #8A8178;
    --surface: #F3EFE6;
    --border: rgba(139,117,64,0.25);
    --border-strong: rgba(139,117,64,0.5);
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── PIN SCREEN ── */
  #pin-screen {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .pin-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    width: 100%;
    max-width: 320px;
  }

  .logo-block {
    text-align: center;
  }

  .logo-img {
    width: 180px;
    height: auto;
    display: block;
    margin: 0 auto 0.5rem;
  }

  .brand-sub {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--ink-light);
    text-transform: uppercase;
  }

  .pin-divider {
    width: 40px;
    height: 1px;
    background: var(--border-strong);
  }

  .pin-label {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--ink-light);
    text-transform: uppercase;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
  }

  .pin-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: transparent;
    transition: background 0.2s, transform 0.15s;
  }

  .pin-dot.filled {
    background: var(--gold);
    transform: scale(1.15);
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }

  .pin-btn {
    height: 56px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    background: transparent;
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.05em;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .pin-btn:hover { background: var(--cream-dark); }
  .pin-btn:active { background: var(--gold-pale); transform: scale(0.97); }

  .pin-btn.small {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .pin-error {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #8B4040;
    min-height: 16px;
    text-align: center;
  }

  /* ── MAIN SCREEN ── */
  #main-screen {
    min-height: 100vh;
    padding: 0;
  }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header-logo {
    width: 90px;
    height: auto;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border-strong);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .app-body {
    padding: 1.75rem 1.5rem;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .field-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
    display: block;
  }

  .main-textarea {
    width: 100%;
    min-height: 200px;
    padding: 14px 16px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    background: var(--surface);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .main-textarea:focus { border-color: var(--gold); }
  .main-textarea::placeholder { color: var(--ink-light); opacity: 0.7; }

  .extra-section { margin-top: 1rem; }

  .extra-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }

  .extra-row { display: flex; gap: 8px; }

  .extra-row textarea {
    flex: 1;
    min-height: 80px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--surface);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .extra-row textarea:focus { border-color: var(--gold); }
  .extra-row textarea::placeholder { color: var(--ink-light); opacity: 0.7; }

  .remove-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
    transition: border-color 0.15s, color 0.15s;
  }

  .remove-btn:hover { border-color: #8B4040; color: #8B4040; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 1.25rem;
  }

  .btn-add {
    flex: 1;
    height: 44px;
    border: 1px dashed var(--border-strong);
    border-radius: 2px;
    background: transparent;
    color: var(--ink-light);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-add:hover { background: var(--cream-dark); }

  .btn-process {
    flex: 2;
    height: 44px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    background: var(--gold);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-process:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn-process:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--border-strong);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULT ── */
  .result-card {
    margin-top: 1.5rem;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    background: var(--surface);
    overflow: hidden;
  }

  .result-header {
    background: var(--gold);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .result-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--cream);
    letter-spacing: 0.08em;
  }

  .result-date-badge {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--gold-pale);
    text-transform: uppercase;
  }

  .result-body { padding: 1.25rem; }

  .result-section { margin-bottom: 1.25rem; }
  .result-section:last-child { margin-bottom: 0; }

  .result-section-title {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid rgba(139,117,64,0.1);
  }

  .result-item:last-child { border-bottom: none; }

  .item-name {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--ink);
  }

  .item-qty {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  .item-unit {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    margin-left: 5px;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }

  .btn-copy {
    flex: 1;
    height: 40px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    background: transparent;
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-copy:hover { background: rgba(139,117,64,0.08); }

  .btn-reset {
    height: 40px;
    padding: 0 18px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    background: transparent;
    color: var(--ink-light);
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-reset:hover { background: var(--cream-dark); }

  .copied-msg {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #5A7A5A;
    text-transform: uppercase;
    min-height: 14px;
    padding: 0 1.25rem 0.75rem;
    text-align: center;
    background: var(--cream);
  }

  @media (max-width: 420px) {
    .app-header { padding: 1rem; }
    .app-body { padding: 1.25rem 1rem; }
    .header-logo { width: 72px; }
    .header-text h1 { font-size: 15px; }
  }
</style>
</head>

    <div class="header-text">
      <h1>Wastage Consolidator</h1>
      <p>Be Beach Dubai &middot; by Addmind</p>
    </div>
  </div>

  <div class="app-body">
    <label class="field-label" for="main-input">All bar messages</label>
    <textarea
      class="main-textarea"
      id="main-input"
      placeholder="Paste all WhatsApp messages here — as many bars as needed, all at once..."
    ></textarea>

    <div id="extra-label-wrap"></div>
    <div id="extra-list"></div>

    <div class="actions">
      <button class="btn-add" onclick="addExtra()">+ Add missing bar</button>
      <button class="btn-process" id="process-btn" onclick="processMessages()">Process</button>
    </div>

    <div class="status-bar" id="status-bar"></div>
    <div id="result-area"></div>
  </div>
</div>

<script>
const CORRECT_PIN = '2580';
let pinBuffer = '';
let extraCount = 0;

function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}
function pinDelete() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }
function pinClear() { pinBuffer = ''; updateDots(); }
function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
}
function checkPin() {
  if (pinBuffer === CORRECT_PIN) {
    document.getElementById('pin-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN. Please try again.';
    pinBuffer = ''; updateDots();
    setTimeout(() => { document.getElementById('pin-error').textContent = ''; }, 2000);
  }
}

function addExtra() {
  extraCount++;
  const id = 'extra-' + extraCount;
  const wrap = document.getElementById('extra-label-wrap');
  if (!wrap.hasChildNodes()) {
    wrap.innerHTML = '<label class="field-label" style="margin-top:1rem;display:block;">Additional messages</label>';
  }
  const list = document.getElementById('extra-list');
  const div = document.createElement('div');
  div.className = 'extra-row';
  div.id = id;
  div.style.marginBottom = '10px';
  div.innerHTML = `<textarea placeholder="Paste additional bar message here..." style="flex:1;min-height:80px;padding:12px 14px;border:1px solid var(--border);border-radius:2px;background:var(--surface);color:var(--ink);font-family:'Jost',sans-serif;font-size:13px;font-weight:300;resize:vertical;outline:none;line-height:1.6;"></textarea>
    <button class="remove-btn" onclick="removeExtra('${id}')" title="Remove" style="margin-left:8px;align-self:flex-start;margin-top:2px;">&#215;</button>`;
  list.appendChild(div);
}

function removeExtra(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  if (document.getElementById('extra-list').children.length === 0) {
    document.getElementById('extra-label-wrap').innerHTML = '';
  }
}

function setStatus(msg, loading) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = loading
    ? `<div class="spinner"></div><span>${msg}</span>`
    : (msg ? `<span>${msg}</span>` : '');
}

async function processMessages() {
  const main = document.getElementById('main-input').value.trim();
  const extras = Array.from(document.querySelectorAll('#extra-list textarea'))
    .map(t => t.value.trim()).filter(Boolean);
  const allParts = [main, ...extras].filter(Boolean);

  if (allParts.length === 0) {
    setStatus('Please paste at least one message before processing.');
    return;
  }

  const btn = document.getElementById('process-btn');
  btn.disabled = true;
  document.getElementById('result-area').innerHTML = '';
  setStatus('Analysing messages...', true);

  const combined = allParts.join('\n\n');

  const systemPrompt = `You are a specialist assistant for consolidating bar wastage reports.
Your task is to analyse WhatsApp messages from different bars, identify all items, group those that are the same or equivalent (even with slightly different names, spelling errors or abbreviations), and sum their quantities.

UNIT RULES:
- Soft drinks (tonic, soda, pepsi, 7up, redbull, cola, ginger ale, mango juice when sold as a can, etc.): if no unit is given, count in CANS. If given in ml, convert to litres. If given in L, keep as is.
- Mediterranean tonic / Medit tonic / Med. tonic: count in BOTTLES.
- Elderflower tonic / Elderflower soda: count in BOTTLES.
- Pink soda / Pink Soda: count in BOTTLES.
- Milk (full fat milk, low fat milk, etc.): count in LITRES. Include these in the soft_drinks category.
- Juices (lime juice, lemon juice, orange juice, grapefruit juice, green apple juice, etc.): final unit in LITRES. If no explicit unit but it is a juice, assume litres. Convert ml to litres.
- Fruits and vegetables (lime, lemon, orange, grapefruit, cucumber, jalapeño, passion fruit, baby corn, popcorn leaves, etc.): final unit in KG. Convert grams to kg. If given in "pcs" or "pieces", count as PIECES separately.
- Purées (strawberry puree, passion fruit puree): in KG.

GROUPING: Group similar names intelligently. Examples: "Med. tonic", "Medit tonic", "Mediterranean tonic" → "Mediterranean Tonic". "7up diet" and "Diet 7up" → "Diet 7up". "Redbull sugarfree" and "Redbull sugar free" → "Redbull Sugarfree". "gr", "g" and "grams" are the same. Be smart with variations and spelling mistakes.

DATE: Extract the date from the messages. If there are multiple dates, use the most common one or the first one found. Format: DD/MM/YYYY.

RESPOND ONLY with this exact JSON format, no extra text, no markdown, no backticks:
{
  "date": "DD/MM/YYYY",
  "soft_drinks": [
    {"name": "Item name", "quantity": 0.0, "unit": "cans|bottles|L"}
  ],
  "produce": [
    {"name": "Item name", "quantity": 0.0, "unit": "kg|pcs|L"}
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: combined }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResult(parsed);
    setStatus('');
  } catch (err) {
    setStatus('Error processing. Please check the input and try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data) {
  const area = document.getElementById('result-area');

  let softHTML = '';
  if (data.soft_drinks && data.soft_drinks.length > 0) {
    softHTML = `<div class="result-section">
      <div class="result-section-title">Soft Drinks &amp; Beverages</div>
      ${data.soft_drinks.map(i => `
        <div class="result-item">
          <span class="item-name">${i.name}</span>
          <span class="item-qty">${fmtQ(i.quantity)}<span class="item-unit">${i.unit}</span></span>
        </div>`).join('')}
    </div>`;
  }

  let produceHTML = '';
  if (data.produce && data.produce.length > 0) {
    produceHTML = `<div class="result-section">
      <div class="result-section-title">Fruits &amp; Vegetables</div>
      ${data.produce.map(i => `
        <div class="result-item">
          <span class="item-name">${i.name}</span>
          <span class="item-qty">${fmtQ(i.quantity)}<span class="item-unit">${i.unit}</span></span>
        </div>`).join('')}
    </div>`;
  }

  area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="result-header-title">Wastage Report</span>
        <span class="result-date-badge">${data.date}</span>
      </div>
      <div class="result-body">
        ${softHTML}
        ${produceHTML}
      </div>
      <div class="result-actions">
        <button class="btn-copy" onclick="copyResult()">Copy Report</button>
        <button class="btn-reset" onclick="resetAll()">New Date</button>
      </div>
      <div class="copied-msg" id="copied-msg"></div>
    </div>`;

  window._resultData = data;
}

function fmtQ(n) {
  if (n === Math.floor(n)) return n.toString();
  return parseFloat(n.toFixed(3)).toString();
}

function copyResult() {
  const d = window._resultData;
  if (!d) return;
  let txt = 'WASTAGE REPORT — ' + d.date + '\n\n';
  if (d.soft_drinks && d.soft_drinks.length > 0) {
    txt += 'SOFT DRINKS & BEVERAGES\n';
    d.soft_drinks.forEach(function(i) { txt += i.name + ': ' + fmtQ(i.quantity) + ' ' + i.unit + '\n'; });
  }
  if (d.produce && d.produce.length > 0) {
    txt += '\nFRUITS & VEGETABLES\n';
    d.produce.forEach(function(i) { txt += i.name + ': ' + fmtQ(i.quantity) + ' ' + i.unit + '\n'; });
  }

  var el = document.getElementById('copied-msg');

  // Try modern clipboard API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(function() {
      el.textContent = 'Report copied to clipboard';
      setTimeout(function() { el.textContent = ''; }, 2500);
    }).catch(function() { fallbackCopy(txt, el); });
  } else {
    fallbackCopy(txt, el);
  }
}

function fallbackCopy(txt, el) {
  // Create a temporary textarea, select it, and execCommand copy
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  ta.style.opacity = '0';
  ta.style.fontSize = '16px'; // prevents iOS zoom
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  // For iOS
  ta.setSelectionRange(0, 99999);
  var success = false;
  try {
    success = document.execCommand('copy');
  } catch(e) {}
  document.body.removeChild(ta);
  if (el) {
    el.textContent = success ? 'Report copied to clipboard' : 'Copy failed — please copy manually';
    setTimeout(function() { el.textContent = ''; }, 3000);
  }
}

function resetAll() {
  document.getElementById('main-input').value = '';
  document.getElementById('extra-list').innerHTML = '';
  document.getElementById('extra-label-wrap').innerHTML = '';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('status-bar').innerHTML = '';
  extraCount = 0;
}
</script>
</body>
